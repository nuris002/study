<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nis Qadam — Болашаққа қадам</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; }
        h1, h2, h3, .font-sora { font-family: 'Sora', sans-serif; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; }
        .card-shadow:hover { transform: translateY(-4px); box-shadow: 0 12px 25px -5px rgba(99, 102, 241, 0.15); }
        .active-link { background-color: #eef2ff; color: #6366f1; font-weight: 600; border-right: 4px solid #6366f1; }
        @keyframes xp-float {
            0% { opacity: 0; transform: translateY(0); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-40px); }
        }
        .xp-gain { animation: xp-float 1.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // Надежные SVG иконки вместо Lucide
        const Icons = {
            Layout: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>,
            Play: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
            Zap: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
            Trophy: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>,
            Book: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        };

        const RANKS = [
            { name: 'Talapker', min: 0, emoji: '🌱', color: 'text-slate-500', bg: 'bg-slate-100' },
            { name: 'Zhas Talant', min: 5000, emoji: '⚡', color: 'text-indigo-600', bg: 'bg-indigo-50' },
            { name: 'Bilimpaz', min: 15000, emoji: '🥇', color: 'text-amber-600', bg: 'bg-amber-50' },
            { name: 'Akademik', min: 30000, emoji: '👑', color: 'text-emerald-600', bg: 'bg-emerald-50' },
        ];

        function App() {
            const [isAuth, setIsAuth] = useState(false);
            const [page, setPage] = useState('dashboard');
            const [user, setUser] = useState({ name: 'Аружан Сейіт', xp: 8450 });
            const [isAnimating, setIsAnimating] = useState(false);

            const currentRank = useMemo(() => {
                return [...RANKS].reverse().find(r => user.xp >= r.min) || RANKS[0];
            }, [user.xp]);

            const progress = ((user.xp % 1000) / 10).toFixed(0);

            if (!isAuth) return (
                <div className="h-screen w-full flex items-center justify-center bg-slate-50 p-6">
                    <div className="max-w-md w-full bg-white rounded-[40px] p-12 card-shadow border border-slate-100 text-center">
                        <div className="inline-flex bg-indigo-600 p-4 rounded-[20px] text-white shadow-xl shadow-indigo-100 mb-6">
                            <Icons.Book />
                        </div>
                        <h1 className="text-3xl font-bold font-sora text-slate-800 mb-2">Nis Qadam</h1>
                        <p className="text-slate-500 mb-10">Болашағыңды бүгіннен баста</p>
                        <div className="space-y-4">
                            <input type="text" placeholder="Логин" className="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-500 transition-all" />
                            <button onClick={() => setIsAuth(true)} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition-all mt-4">Кіру</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 bg-white border-r border-slate-200 flex flex-col z-20">
                        <div className="p-6 flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg"><Icons.Book /></div>
                            <span className="text-xl font-bold font-sora tracking-tight text-slate-800">Nis Qadam</span>
                        </div>
                        <nav className="flex-1 px-4 space-y-1 mt-4">
                            <button onClick={() => setPage('dashboard')} className={`flex items-center gap-3 w-full px-4 py-3 rounded-xl transition-all ${page === 'dashboard' ? 'active-link' : 'text-slate-500 hover:bg-slate-50'}`}>
                                <Icons.Layout /> <span className="font-medium">Басты бет</span>
                            </button>
                            <button onClick={() => setPage('video')} className={`flex items-center gap-3 w-full px-4 py-3 rounded-xl transition-all ${page === 'video' ? 'active-link' : 'text-slate-500 hover:bg-slate-50'}`}>
                                <Icons.Play /> <span className="font-medium">Сабақтар</span>
                            </button>
                        </nav>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col relative overflow-y-auto">
                        <header className="h-16 bg-white/80 backdrop-blur-md border-b px-8 flex items-center justify-between sticky top-0 z-10">
                            <h2 className="font-bold text-slate-800 uppercase tracking-wider text-xs">{page === 'dashboard' ? 'Жалпы шолу' : 'Сабақ көру'}</h2>
                            <div className="bg-indigo-50 px-4 py-1.5 rounded-full border border-indigo-100 flex items-center gap-2">
                                <span className="text-indigo-600"><Icons.Zap /></span>
                                <span className="text-sm font-bold text-indigo-600">{user.xp.toLocaleString()} XP</span>
                            </div>
                        </header>

                        <div className="p-8 max-w-6xl mx-auto w-full">
                            {page === 'dashboard' ? (
                                <div className="space-y-8">
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                        <div className="lg:col-span-2 bg-indigo-600 rounded-[32px] p-10 text-white relative overflow-hidden shadow-2xl">
                                            <div className="relative z-10">
                                                <h1 className="text-3xl font-bold font-sora mb-2">Қайырлы күн, {user.name}!</h1>
                                                <p className="text-indigo-100 mb-8 max-w-md">НИШ-ке түсуге тағы бір қадам қалды.</p>
                                                <button onClick={() => setPage('video')} className="bg-white text-indigo-600 px-8 py-3 rounded-2xl font-bold hover:shadow-xl transition-all">Сабақты бастау</button>
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-[32px] p-8 card-shadow border border-slate-100 text-center">
                                            <div className="text-5xl mb-4">{currentRank.emoji}</div>
                                            <h3 className="text-xl font-bold text-slate-800">{currentRank.name}</h3>
                                            <div className="mt-6 space-y-2">
                                                <div className="flex justify-between text-xs font-bold text-slate-500">
                                                    <span>Прогресс</span> <span>{progress}%</span>
                                                </div>
                                                <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
                                                    <div className="h-full bg-indigo-500" style={{ width: `${progress}%` }}></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[32px] card-shadow border border-slate-100 h-64 flex items-center justify-center text-slate-300 font-bold uppercase tracking-widest">
                                        График белсенділігі
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    <div className="aspect-video bg-black rounded-[32px] overflow-hidden shadow-2xl relative border-4 border-white">
                                        <iframe className="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameBorder="0" allowFullScreen></iframe>
                                    </div>
                                    <div className="bg-white p-8 rounded-[32px] card-shadow flex justify-between items-center">
                                        <div>
                                            <h2 className="text-2xl font-bold text-slate-800">Математика: Теңдеулер</h2>
                                            <p className="text-slate-400 italic">Сабақты аяқтап, 150 XP алыңыз</p>
                                        </div>
                                        <button 
                                            onClick={() => {
                                                setIsAnimating(true);
                                                setUser(p => ({...p, xp: p.xp + 150}));
                                                setTimeout(() => setIsAnimating(false), 1500);
                                            }} 
                                            className="bg-emerald-500 text-white px-8 py-4 rounded-2xl font-bold shadow-lg hover:bg-emerald-600 transition-all"
                                        >
                                            Сабақты аяқтау
                                        </button>
                                        {isAnimating && <div className
