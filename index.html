<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nis Qadam — Болашаққа қадам</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; }
        h1, h2, h3, .font-sora { font-family: 'Sora', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; }
        .card-shadow:hover { transform: translateY(-4px); box-shadow: 0 12px 25px -5px rgba(99, 102, 241, 0.15); }
        .active-link { background-color: #eef2ff; color: #6366f1; font-weight: 600; border-right: 4px solid #6366f1; }
        @keyframes xp-float {
            0% { opacity: 0; transform: translateY(0); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-40px); }
        }
        .xp-gain { animation: xp-float 1.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

        // Компонент иконки, который точно работает в браузере
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const RANKS = [
            { name: 'Talapker', min: 0, emoji: '🌱', color: 'text-slate-500', bg: 'bg-slate-100' },
            { name: 'Zhas Talant', min: 5000, emoji: '⚡', color: 'text-indigo-600', bg: 'bg-indigo-50' },
            { name: 'Bilimpaz', min: 15000, emoji: '🥇', color: 'text-amber-600', bg: 'bg-amber-50' },
            { name: 'Akademik', min: 30000, emoji: '👑', color: 'text-emerald-600', bg: 'bg-emerald-50' },
        ];

        const ACTIVITY_DATA = [
            { name: 'Дүй', xp: 400 }, { name: 'Сей', xp: 700 }, { name: 'Сәр', xp: 450 },
            { name: 'Бей', xp: 1000 }, { name: 'Жұм', xp: 850 }, { name: 'Сен', xp: 300 }, { name: 'Жек', xp: 500 }
        ];

        function App() {
            const [isAuth, setIsAuth] = useState(false);
            const [page, setPage] = useState('dashboard');
            const [user, setUser] = useState({ name: 'Аружан Сейіт', xp: 8450, level: 8 });
            const [isAnimating, setIsAnimating] = useState(false);

            const currentRank = useMemo(() => {
                return [...RANKS].reverse().find(r => user.xp >= r.min) || RANKS[0];
            }, [user.xp]);

            const progress = ((user.xp % 1000) / 10).toFixed(0);

            if (!isAuth) return (
                <div className="h-screen w-full flex items-center justify-center bg-slate-50 p-6">
                    <div className="max-w-md w-full bg-white rounded-[40px] p-12 card-shadow border border-slate-100 text-center">
                        <div className="inline-flex bg-indigo-600 p-4 rounded-[20px] text-white shadow-xl shadow-indigo-100 mb-6">
                            <Icon name="book-open" size={32} />
                        </div>
                        <h1 className="text-3xl font-bold font-sora text-slate-800 mb-2">Nis Qadam</h1>
                        <p className="text-slate-500 mb-10">Болашағыңды бүгіннен баста</p>
                        <div className="space-y-4 text-left">
                            <input type="text" placeholder="Логин" className="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-500 transition-all" />
                            <input type="password" placeholder="Құпия сөз" className="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-500 transition-all" />
                            <button onClick={() => setIsAuth(true)} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition-all mt-4">Кіру</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 bg-white border-r border-slate-200 flex flex-col z-20">
                        <div className="p-6 flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg">
                                <Icon name="book-open" size={24} />
                            </div>
                            <span className="text-xl font-bold font-sora tracking-tight text-slate-800">Nis Qadam</span>
                        </div>
                        <nav className="flex-1 px-4 space-y-1 mt-4">
                            <button onClick={() => setPage('dashboard')} className={`flex items-center gap-3 w-full px-4 py-3 rounded-xl transition-all ${page === 'dashboard' ? 'active-link' : 'text-slate-500 hover:bg-slate-50'}`}>
                                <Icon name="layout" /> <span className="font-medium">Басты бет</span>
                            </button>
                            <button onClick={() => setPage('video')} className={`flex items-center gap-3 w-full px-4 py-3 rounded-xl transition-all ${page === 'video' ? 'active-link' : 'text-slate-500 hover:bg-slate-50'}`}>
                                <Icon name="play-circle" /> <span className="font-medium">Сабақтар</span>
                            </button>
                            <button className="flex items-center gap-3 w-full px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50">
                                <Icon name="trophy" /> <span className="font-medium">Рейтинг</span>
                            </button>
                        </nav>
                        <div className="p-4 border-t border-slate-100">
                            <button onClick={() => setIsAuth(false)} className="flex items-center gap-3 w-full p-3 text-slate-500 hover:text-red-500 transition-colors">
                                <Icon name="log-out" /> <span className="font-medium">Шығу</span>
                            </button>
                        </div>
                    </aside>

                    {/* Main */}
                    <main className="flex-1 flex flex-col relative overflow-y-auto">
                        <header className="h-16 glass px-8 flex items-center justify-between sticky top-0 z-10">
                            <h2 className="font-bold text-slate-800 uppercase tracking-wider text-sm">{page === 'dashboard' ? 'Жалпы шолу' : 'Сабақ көру'}</h2>
                            <div className="flex items-center gap-4">
                                <div className="flex items-center gap-2 bg-indigo-50 px-4 py-1.5 rounded-full border border-indigo-100">
                                    <Icon name="zap" size={16} className="text-indigo-600 fill-indigo-600" />
                                    <span className="text-sm font-bold text-indigo-600">{user.xp.toLocaleString()} XP</span>
                                </div>
                            </div>
                        </header>

                        <div className="p-8 max-w-6xl mx-auto w-full">
                            {page === 'dashboard' ? (
                                <div className="space-y-8 animate-in fade-in duration-700">
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                        <div className="lg:col-span-2 bg-indigo-600 rounded-[32px] p-10 text-white relative overflow-hidden shadow-2xl">
                                            <div className="relative z-10">
                                                <h1 className="text-3xl font-bold font-sora mb-2">Қайырлы күн!</h1>
                                                <p className="text-indigo-100 mb-8 max-w-md">Бүгін Математикадан жаңа тақырыпты меңгеруді ұсынамыз.</p>
                                                <button onClick={() => setPage('video')} className="bg-white text-indigo-600 px-8 py-3 rounded-2xl font-bold hover:bg-indigo-50 transition-all">Сабақты бастау</button>
                                            </div>
                                            <Icon name="award" size={150} className="absolute -right-4 -bottom-4 opacity-10 rotate-12" />
                                        </div>
                                        <div className="bg-white rounded-[32px] p-8 card-shadow border border-slate-100 text-center">
                                            <div className="text-5xl mb-4">{currentRank.emoji}</div>
                                            <h3 className="text-xl font-bold text-slate-800">{currentRank.name}</h3>
                                            <div className="mt-6 space-y-2">
                                                <div className="flex justify-between text-xs font-bold text-slate-500">
                                                    <span>Прогресс</span> <span>{progress}%</span>
                                                </div>
                                                <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
                                                    <div className="h-full bg-indigo-500" style={{ width: `${progress}%` }}></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white p-8 rounded-[32px] card-shadow border border-slate-100">
                                        <h3 className="text-lg font-bold mb-6 flex items-center gap-2"><Icon name="bar-chart-2" className="text-indigo-600" /> Белсенділік</h3>
                                        <div className="h-[250px] w-full">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <AreaChart data={ACTIVITY_DATA}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#94a3b8', fontSize: 12}} />
                                                    <Tooltip />
                                                    <Area type="monotone" dataKey="xp" stroke="#6366f1" strokeWidth={3} fill="#eef2ff" />
                                                </AreaChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-in slide-in-from-right-4 duration-500">
                                    <div className="lg:col-span-2 space-y-6">
                                        <div className="aspect-video bg-black rounded-[32px] overflow-hidden shadow-2xl relative border-4 border-white">
                                            <iframe className="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameBorder="0" allowFullScreen></iframe>
                                        </div>
                                        <div className="bg-white p-8 rounded-[32px] card-shadow">
                                            <h2 className="text-2xl font-bold mb-4">Математика: Теңдеулер жүйесі</h2>
                                            <button 
                                                onClick={() => {
                                                    setIsAnimating(true);
                                                    setUser(p => ({...p, xp: p.xp + 150}));
                                                    setTimeout(() => setIsAnimating(false), 1500);
                                                }} 
                                                className="bg-emerald-500 text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:bg-emerald-600 transition-all flex items-center gap-2"
                                            >
                                                <Icon name="check-circle" /> Сабақты аяқтау (+150 XP)
                                            </button>
                                            {isAnimating && <div className="fixed top-1/2 left-1/2 z-50 text-indigo-600 font-bold text-4xl xp-gain">+150 XP</div>}
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <h3 className="font-bold text-slate-800">Келесі сабақтар</h3>
                                        {[1,2,3].map(i => (
                                            <div key={i} className="bg-white p-4 rounded-2xl border border-slate-100 flex items-center gap-4 cursor-pointer hover:border-indigo-300 transition-all">
                                                <div className="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center text-slate-400 font-bold">{i}</div>
                                                <div className="text-sm font-bold text-slate-800">Логикалық есептер #{i}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
