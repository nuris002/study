<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nis Qadam — Болашаққа қадам</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        h1, h2, h3, .font-sora { font-family: 'Sora', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; }
        .card-shadow:hover { transform: translateY(-4px); box-shadow: 0 12px 25px -5px rgba(99, 102, 241, 0.15); }
        .sidebar-item:hover { background-color: #f1f5f9; color: #6366f1; }
        .active-link { background-color: #eef2ff; color: #6366f1; font-weight: 600; border-right: 4px solid #6366f1; }
        /* Анимация XP */
        @keyframes xp-float {
            0% { opacity: 0; transform: translateY(0); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-40px); }
        }
        .xp-gain { animation: xp-float 1.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer 
        } = Recharts;

        // --- ИКОНКИ ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        // --- ДАННЫЕ ---
        const RANKS = [
            { name: 'Talapker', min: 0, emoji: '🌱', color: 'text-slate-500', bg: 'bg-slate-100', border: 'border-slate-200' },
            { name: 'Zhas Talant', min: 5000, emoji: '⚡', color: 'text-indigo-600', bg: 'bg-indigo-50', border: 'border-indigo-200' },
            { name: 'Bilimpaz', min: 15000, emoji: '🥇', color: 'text-amber-600', bg: 'bg-amber-50', border: 'border-amber-200' },
            { name: 'Akademik', min: 30000, emoji: '👑', color: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-200' },
        ];

        const ACTIVITY_DATA = [
            { name: 'Дүй', xp: 400 }, { name: 'Сей', xp: 700 }, { name: 'Сәр', xp: 450 },
            { name: 'Бей', xp: 1000 }, { name: 'Жұм', xp: 850 }, { name: 'Сен', xp: 300 }, { name: 'Жек', xp: 500 }
        ];

        // --- ГЛАВНЫЙ КОМПОНЕНТ ---
        function NisQadamApp() {
            const [isAuth, setIsAuth] = useState(false);
            const [page, setPage] = useState('dashboard');
            const [user, setUser] = useState({ name: 'Аружан Сейіт', xp: 8450, level: 8 });
            const [isAnimating, setIsAnimating] = useState(false);

            const rank = useMemo(() => {
                return [...RANKS].reverse().find(r => user.xp >= r.min) || RANKS[0];
            }, [user.xp]);

            const nextRank = RANKS[RANKS.indexOf(rank) + 1] || rank;
            const progress = ((user.xp % 1000) / 10).toFixed(0);

            const addXP = (amount) => {
                setIsAnimating(true);
                setUser(prev => ({ ...prev, xp: prev.xp + amount }));
                setTimeout(() => setIsAnimating(false), 1500);
            };

            if (!isAuth) return <AuthPage onLogin={() => setIsAuth(true)} />;

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 bg-white border-r border-slate-200 flex flex-col z-20">
                        <div className="p-6 flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-200">
                                <Icon name="book-open" size={24} />
                            </div>
                            <span className="text-xl font-bold font-sora tracking-tight text-slate-800">Nis Qadam</span>
                        </div>
                        <nav className="flex-1 px-4 space-y-1 mt-4">
                            <SidebarLink active={page === 'dashboard'} onClick={() => setPage('dashboard')} icon="layout" label="Басты бет" />
                            <SidebarLink active={page === 'video'} onClick={() => setPage('video')} icon="play-circle" label="Сабақтар" />
                            <SidebarLink active={page === 'rating'} onClick={() => setPage('rating')} icon="tropy" label="Рейтинг" />
                            <SidebarLink active={page === 'stats'} onClick={() => setPage('stats')} icon="bar-chart-3" label="Талдау" />
                        </nav>
                        <div className="p-4 border-t border-slate-100">
                            <button onClick={() => setIsAuth(false)} className="flex items-center gap-3 w-full p-3 text-slate-500 hover:text-red-500 transition-colors">
                                <Icon name="log-out" size={20} />
                                <span className="font-medium">Шығу</span>
                            </button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col relative overflow-y-auto">
                        {isAnimating && (
                            <div className="fixed top-1/2 left-1/2 -translate-x-1/2 z-50 text-indigo-600 font-bold text-3xl xp-gain">
                                +150 XP 🚀
                            </div>
                        )}

                        <header className="h-16 glass px-8 flex items-center justify-between sticky top-0 z-10">
                            <h2 className="text-lg font-bold text-slate-800 uppercase tracking-wider text-sm">
                                {page === 'dashboard' ? 'Жалпы шолу' : 'Оқу бөлімі'}
                            </h2>
                            <div className="flex items-center gap-6">
                                <div className="flex items-center gap-2 bg-indigo-50 px-4 py-1.5 rounded-full border border-indigo-100">
                                    <Icon name="zap" size={16} className="text-indigo-600 fill-indigo-600" />
                                    <span className="text-sm font-bold text-indigo-600">{user.xp.toLocaleString()} XP</span>
                                </div>
                                <div className="w-10 h-10 rounded-full bg-slate-200 border-2 border-white shadow-sm overflow-hidden">
                                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Arujan" alt="avatar" />
                                </div>
                            </div>
                        </header>

                        <div className="p-8 max-w-6xl mx-auto w-full">
                            {page === 'dashboard' ? (
                                <Dashboard user={user} rank={rank} nextRank={nextRank} progress={progress} />
                            ) : (
                                <VideoLesson onComplete={() => addXP(150)} />
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        // --- КОМПОНЕНТЫ СТРАНИЦ ---

        function SidebarLink({ active, onClick, icon, label }) {
            return (
                <button onClick={onClick} className={`sidebar-item flex items-center gap-3 w-full px-4 py-3 rounded-xl transition-all ${active ? 'active-link' : 'text-slate-500'}`}>
                    <Icon name={icon} size={20} />
                    <span className="font-medium">{label}</span>
                </button>
            );
        }

        function Dashboard({ user, rank, nextRank, progress }) {
            return (
                <div className="space-y-8 animate-in fade-in duration-700">
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 bg-indigo-600 rounded-[32px] p-10 text-white relative overflow-hidden shadow-2xl shadow-indigo-200">
                            <div className="relative z-10">
                                <h1 className="text-3xl font-bold font-sora mb-2">Қайырлы күн, {user.name}!</h1>
                                <p className="text-indigo-100 mb-8 max-w-md">НИШ-ке түсуге тағы бір қадам қалды. Бүгінгі мақсат — Математикадан тест тапсыру.</p>
                                <button className="bg-white text-indigo-600 px-8 py-3 rounded-2xl font-bold shadow-lg hover:bg-indigo-50 transition-all">Сабақты бастау</button>
                            </div>
                            <Icon name="award" size={180} className="absolute -right-8 -bottom-8 opacity-10 rotate-12" />
                        </div>

                        <div className="bg-white rounded-[32px] p-8 card-shadow border border-slate-100 text-center">
                            <div className="text-5xl mb-4">{rank.emoji}</div>
                            <h3 className="text-xl font-bold text-slate-800 mb-1">{rank.name}</h3>
                            <p className="text-slate-400 text-sm mb-6">Деңгей {user.level}</p>
                            <div className="space-y-2">
                                <div className="flex justify-between text-xs font-bold text-slate-500">
                                    <span>Прогресс</span>
                                    <span>{progress}%</span>
                                </div>
                                <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
                                    <div className="h-full bg-indigo-500 transition-all duration-1000" style={{ width: `${progress}%` }}></div>
                                </div>
                                <p className="text-[10px] text-slate-400 pt-2 italic">Келесі ранг: {nextRank.name}</p>
                            </div>
                        </div>
